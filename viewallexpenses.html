<!DOCTYPE html>
<html>
<head>

<title>All Expenses</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0072ff;
    color:white;
}

button{

    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;

}

.delete{

    background:red;
    color:white;

}

.back{

    background:#0072ff;
    color:white;
    margin-top:20px;

}

</style>

</head>

<body>

<h2>All Expenses</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>User</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="table">

</tbody>

</table>

<center>

<button
class="back"
onclick="location.href='admindashboard.html'">

Back

</button>

</center>

<script>

async function loadExpenses(){

    let response =
    await fetch(
        "http://localhost:8080/admin/expenses"
    );

    let expenses =
    await response.json();

    let table =
    document.getElementById("table");

    table.innerHTML="";

    expenses.forEach(expense=>{

        table.innerHTML +=`

        <tr>

        <td>${expense.id}</td>

        <td>${expense.user.name}</td>

        <td>${expense.category}</td>

        <td>₹${expense.amount}</td>

        <td>${expense.expenseDate}</td>

        <td>

        <button
        class="delete"
        onclick="deleteExpense(${expense.id})">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

}

async function deleteExpense(id){

    if(confirm("Delete Expense?")){

        await fetch(

            "http://localhost:8080/expense/"+id,

            {

                method:"DELETE"

            }

        );

        alert("Deleted Successfully");

        loadExpenses();

    }

}

loadExpenses();

</script>

</body>
</html>
