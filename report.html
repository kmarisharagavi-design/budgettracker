<!DOCTYPE html>
<html>
<head>
    <title>Budget Report</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:500px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
    text-align:center;
}

h2{
    color:#0072ff;
    margin-bottom:20px;
}

p{
    margin:15px 0;
    color:#555;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    cursor:pointer;
    margin:10px;
}

button:hover{
    background:#0057c2;
}

</style>

</head>

<body>

<div class="container">

    <h2>Budget Report</h2>

    <p>
        Click the button below to download your Budget Report PDF.
    </p>

    <button onclick="downloadReport()">
        Download PDF
    </button>

    <button onclick="location.href='dashboard.html'">
        Back
    </button>

</div>

<script>

let user =
JSON.parse(localStorage.getItem("loggedUser"));

if(!user){

    alert("Please Login First");

    window.location.href="login.html";
}

function downloadReport(){

    window.open(
        "http://localhost:8080/report/" + user.id,
        "_blank"
    );

}

</script>

</body>
</html>
