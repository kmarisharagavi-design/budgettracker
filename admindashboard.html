<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#0072ff;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:15px;
}

.card p{
    font-size:28px;
    color:#0072ff;
    font-weight:bold;
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

button{

    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    cursor:pointer;
    font-size:16px;

}

button:hover{

    background:#0056cc;

}

</style>

</head>

<body>

<div class="navbar">

<h2>Admin Dashboard</h2>

<button onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="card">
<h3>Total Income</h3>
<p id="totalIncome">₹0</p>
</div>

<div class="card">
<h3>Total Expense</h3>
<p id="totalExpense">₹0</p>
</div>

<div class="card">
<h3>Total Transactions</h3>
<p id="transactions">0</p>
</div>

</div>

<div class="buttons">

<button onclick="location.href='viewusers.html'">
View Users
</button>

<button onclick="location.href='viewallexpenses.html'">
View Expenses
</button>

<button onclick="location.href='viewallincome.html'">
View Income
</button>

</div>

</div>

<script>

let admin =
JSON.parse(localStorage.getItem("loggedUser"));

if(!admin){

    window.location.href="login.html";

}

async function loadAdminDashboard(){

    // Total Users
    let res1 =
    await fetch("http://localhost:8080/admin/users/count");

    let users =
    await res1.json();

    document.getElementById("totalUsers")
    .innerHTML=users;

    // Total Income
    let res2 =
    await fetch("http://localhost:8080/admin/income/total");

    let income =
    await res2.json();

    document.getElementById("totalIncome")
    .innerHTML="₹"+income;

    // Total Expense
    let res3 =
    await fetch("http://localhost:8080/admin/expense/total");

    let expense =
    await res3.json();

    document.getElementById("totalExpense")
    .innerHTML="₹"+expense;

    // Transactions
    let res4 =
    await fetch("http://localhost:8080/admin/transactions");

    let transaction =
    await res4.json();

    document.getElementById("transactions")
    .innerHTML=transaction;

}

function logout(){

    localStorage.removeItem("loggedUser");

    window.location.href="login.html";

}

loadAdminDashboard();

</script>

</body>
</html>
