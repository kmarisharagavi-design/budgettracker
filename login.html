<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.login-box{
    width:380px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    cursor:pointer;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#667eea;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email"
id="email"
placeholder="Enter Email">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div id="message" class="error"></div>

<p>
New User?
<a href="register.html">Register</a>
</p>

</div>

<script>

async function login(){

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    try{

        let response = await fetch(
            "http://localhost:8080/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email:email,
                    password:password
                })
            }
        );

        let user = await response.json();

        if(user && user.id){

            localStorage.setItem(
                "loggedUser",
                JSON.stringify(user)
            );

            alert("Login Successful");

            if(user.role === "ADMIN"){

                window.location.href = "admindashboard.html";

            }else{

                window.location.href = "dashboard.html";

            }

        }else{

            document.getElementById("message")
            .innerHTML =
            "Invalid Email or Password";

        }

    }catch(error){

        document.getElementById("message")
        .innerHTML =
        "Backend Not Running";

    }

}

</script>

</body>
</html>
