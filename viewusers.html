<!DOCTYPE html>
<html>
<head>
<title>View Users</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0072ff;
    color:white;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#0072ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056cc;
}

</style>

</head>

<body>

<h2>All Registered Users</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

<center>

<button onclick="location.href='admindashboard.html'">
Back
</button>

</center>

<script>

async function loadUsers(){

    let response =
    await fetch(
        "http://localhost:8080/admin/users"
    );

    let users =
    await response.json();

    let table =
    document.getElementById("userTable");

    table.innerHTML="";

    users.forEach(user=>{

        table.innerHTML +=`

        <tr>

        <td>${user.id}</td>

        <td>${user.name}</td>

        <td>${user.email}</td>

        <td>${user.role}</td>

        </tr>

        `;

    });

}

loadUsers();

</script>

</body>
</html>
