<!DOCTYPE html>
<html>
<head>
<title>Recent Expenses</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    margin:40px auto;
}

h2{
    text-align:center;
    color:#0072ff;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

th{
    background:#0072ff;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f2f7ff;
}

.back{
    margin-top:25px;
    text-align:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0057c2;
}

</style>

</head>

<body>

<div class="container">

<h2>Recent Expenses</h2>

<table>

<thead>

<tr>
<th>Date</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="recentTable">

</tbody>

</table>

<div class="back">

<button onclick="location.href='dashboard.html'">
Back To Dashboard
</button>

</div>

</div>

<script>

let user =
JSON.parse(localStorage.getItem("loggedUser"));

if(!user){

    alert("Please Login");

    location.href="login.html";
}

async function loadRecent(){

    let response =
    await fetch(
    `http://localhost:8080/expense/recent/${user.id}`);

    let expenses =
    await response.json();

    let table =
    document.getElementById("recentTable");

    table.innerHTML="";

    expenses.forEach(expense=>{

        table.innerHTML+=`

        <tr>

        <td>${expense.expenseDate}</td>

        <td>${expense.category}</td>

        <td>${expense.description}</td>

        <td>₹${expense.amount}</td>

        </tr>

        `;

    });

}

loadRecent();

</script>

</body>
</html>
