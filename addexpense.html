<!DOCTYPE html>

<html>
<head>
    <title>Add Expense</title>


<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#00c6ff,#0072ff);
    }

    .container{
        width:450px;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    input,select,textarea{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
    }

    textarea{
        resize:none;
        height:100px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#0072ff;
        color:white;
        font-size:16px;
        cursor:pointer;
        margin-top:10px;
    }

    button:hover{
        background:#0057c2;
    }

</style>


</head>

<body>

<div class="container">


<h2>Add Expense</h2>

<input
    type="number"
    id="amount"
    placeholder="Enter Amount"
>
<input
type="date"
id="expenseDate">

<select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Health</option>
    <option>Education</option>
    <option>Entertainment</option>
    <option>Other</option>
</select>

<textarea
    id="description"
    placeholder="Enter Description"
></textarea>

<button onclick="saveExpense()">
    Save Expense
</button>

<button onclick="location.href='dashboard.html'">
    Back To Dashboard
</button>


</div>

<script>

async function saveExpense(){

    let amount =
    document.getElementById("amount").value;

    let category =
    document.getElementById("category").value;

    let description =
    document.getElementById("description").value;

    let user =
    JSON.parse(localStorage.getItem("loggedUser"));

    let expenseDate =
document.getElementById("expenseDate").value;

    if(!user){

        alert("Please Login First");

        window.location.href="login.html";

        return;
    }

    try{

        let response =
        await fetch(
            "http://localhost:8080/expense",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
               body:JSON.stringify({
                    amount:amount,
                    expenseDate:expenseDate,
                    category:category,
                    description:description,
                    user:{
                        id:user.id
                    }
                })
            }
        );

        if(response.ok){

            alert("Expense Added Successfully");

            document.getElementById("amount").value="";
            document.getElementById("description").value="";

        }
        else{

            alert("Expense Save Failed");

        }

    }
    catch(error){

        console.log(error);

        alert("Backend Not Running");

    }
}

</script>


</body>
</html>
